name: Build PDF

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          path: resume.pdf
